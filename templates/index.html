<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pothole Patrol Live</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="dashboard">
        
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="logo">
                    <i class="fa-solid fa-road-circle-exclamation"></i>
                </div>
                <h1>RoadWatch System</h1>
                <span class="status-indicator live"><i class="fa-solid fa-circle"></i> LIVE</span>
            </header>

            <nav class="nav-menu">
                <a href="/" class="nav-link active"><i class="fa-solid fa-map-location-dot"></i> Live Tracker</a>
                <a href="/ai-detection" class="nav-link"><i class="fa-solid fa-microchip"></i> AI Monitor</a>
                <a href="/analysis" class="nav-link"><i class="fa-solid fa-chart-pie"></i> Data Analytics</a>
                <a href="/authorities" class="nav-link"><i class="fa-solid fa-database"></i> Database View</a>
            </nav>

            <section class="logs-section">
                <div class="logs-header">
                    <h2>Recent Detections</h2>
                    <span class="badge" id="detection-count">0</span>
                </div>
                <div class="log-list" id="log-list">
                    <div class="empty-state">
                        <i class="fa-solid fa-satellite-dish"></i>
                        <p>Waiting for detections...</p>
                    </div>
                </div>
            </section>
        </aside>

        <!-- MAIN MAP -->
        <main class="map-container">
            <div id="map"></div>
            <!-- Floating overlay widget -->
            <div class="map-overlay">
                <h3>Global Map View</h3>
                <p>Tracking anomalies in real-time.</p>
            </div>
        </main>
        
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
