<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - RoadWatch</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .analytics-main {
            flex: 1;
            background: #111;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
        }
        .ai-header h2 {
            font-size: 2rem;
            color: #fff;
            margin: 0;
            text-transform: none;
            letter-spacing: 0;
        }
        .ai-header p {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-top: 5px;
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        .stat-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 24px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .stat-card h4 {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
        }
        .stat-card .value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #fff;
        }
        .chart-container {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            height: 400px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="logo">
                    <i class="fa-solid fa-road-circle-exclamation"></i>
                </div>
                <h1>RoadWatch System</h1>
                <span class="status-indicator live"><i class="fa-solid fa-circle"></i> LIVE</span>
            </header>

            <nav class="nav-menu">
                <a href="/" class="nav-link"><i class="fa-solid fa-map-location-dot"></i> Live Tracker</a>
                <a href="/ai-detection" class="nav-link"><i class="fa-solid fa-microchip"></i> AI Monitor</a>
                <a href="/analysis" class="nav-link active"><i class="fa-solid fa-chart-pie"></i> Data Analytics</a>
                <a href="/authorities" class="nav-link"><i class="fa-solid fa-database"></i> Database View</a>
            </nav>

            <section class="logs-section">
                <div class="logs-header">
                    <h2>Recent Detections</h2>
                    <span class="badge" id="detection-count">0</span>
                </div>
                <div class="log-list" id="log-list">
                    <!-- Loaded via JS -->
                </div>
            </section>
        </aside>

        <!-- MAIN ANALYTICS WINDOW -->
        <main class="analytics-main">
            <div class="ai-header">
                <h2>System Analytics</h2>
                <p>Overview of infrastructure anomalies detected by YOLOv8</p>
            </div>

            <div class="stats-row">
                <div class="stat-card">
                    <h4>Total Potholes</h4>
                    <div class="value" id="stat-total">0</div>
                </div>
                <div class="stat-card">
                    <h4>Active Cameras</h4>
                    <div class="value">1</div>
                </div>
                <div class="stat-card">
                    <h4>Alerts Sent</h4>
                    <div class="value" id="stat-alerts">0</div>
                </div>
                <div class="stat-card">
                    <h4>System Uptime</h4>
                    <div class="value" style="color: var(--success);">99%</div>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="detectionChart"></canvas>
            </div>
        </main>
        
    </div>

    <script>
        // Chart Initialization
        const ctx = document.getElementById('detectionChart').getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(255, 71, 87, 0.5)');
        gradient.addColorStop(1, 'rgba(255, 71, 87, 0)');

        const detectionChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], // Will hold timestamps
                datasets: [{
                    label: 'Cumulative Detections',
                    data: [],
                    borderColor: '#ff4757',
                    backgroundColor: gradient,
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { color: '#f1f2f6' } }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: '#a4b0be', stepSize: 1 }
                    },
                    x: {
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: '#a4b0be' }
                    }
                }
            }
        });

        // Sync Data
        async function fetchDetections() {
            try {
                const response = await fetch('/api/detections');
                const data = await response.json();
                
                // Update Sidebar
                const logList = document.getElementById('log-list');
                document.getElementById('detection-count').textContent = data.length;
                document.getElementById('stat-total').textContent = data.length;
                document.getElementById('stat-alerts').textContent = data.length > 0 ? 1 : 0; // Simple logic assuming 1 email sent

                if (data.length === 0) {
                     logList.innerHTML = `<div class="empty-state"><i class="fa-solid fa-satellite-dish"></i><p>Waiting for detections...</p></div>`;
                } else {
                    logList.innerHTML = '';
                    data.forEach(det => {
                        logList.innerHTML += `
                            <div class="log-item">
                                <div class="log-item-header">
                                    <span><i class="fa-solid fa-triangle-exclamation" style="color: var(--accent); margin-right: 6px;"></i> Hole #${det.id}</span>
                                    <span class="log-time">${det.time}</span>
                                </div>
                                <div class="log-coords">${det.lat.toFixed(5)}, ${det.lon.toFixed(5)}</div>
                            </div>
                        `;
                    });
                }

                // Update Chart (reverse data because ID 1 is at end of array in backend insert(0))
                const reversedData = [...data].reverse();
                let cumulative = 0;
                const labels = [];
                const chartData = [];
                
                reversedData.forEach((det, idx) => {
                    cumulative += 1;
                    labels.push(det.time);
                    chartData.push(cumulative);
                });

                if(labels.length > 0) {
                    detectionChart.data.labels = labels;
                    detectionChart.data.datasets[0].data = chartData;
                    detectionChart.update();
                }

            } catch (error) { console.error(error); }
        }
        setInterval(fetchDetections, 2000);
        fetchDetections();
    </script>
</body>
</html>
