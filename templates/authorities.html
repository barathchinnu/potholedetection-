<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorities Database - RoadWatch</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .db-main {
            flex: 1;
            background: #111;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
        }
        .ai-header h2 {
            font-size: 2rem;
            color: #fff;
            margin: 0;
            text-transform: none;
            letter-spacing: 0;
        }
        .ai-header p {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-top: 5px;
        }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }

        .record-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        
        .record-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .record-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid var(--border-color);
        }

        .record-info {
            padding: 16px;
        }

        .record-id {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .record-detail {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .record-detail i {
            color: var(--accent);
            width: 16px;
        }
        
        .empty-state-db {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
            background: var(--panel-bg);
            border-radius: 12px;
            border: 1px dashed var(--border-color);
            grid-column: 1 / -1;
        }
        
        .empty-state-db i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="logo">
                    <i class="fa-solid fa-road-circle-exclamation"></i>
                </div>
                <h1>RoadWatch System</h1>
                <span class="status-indicator live"><i class="fa-solid fa-circle"></i> LIVE</span>
            </header>

            <nav class="nav-menu">
                <a href="/" class="nav-link"><i class="fa-solid fa-map-location-dot"></i> Live Tracker</a>
                <a href="/ai-detection" class="nav-link"><i class="fa-solid fa-microchip"></i> AI Monitor</a>
                <a href="/analysis" class="nav-link"><i class="fa-solid fa-chart-pie"></i> Data Analytics</a>
                <a href="/authorities" class="nav-link active"><i class="fa-solid fa-database"></i> Database View</a>
            </nav>

            <section class="logs-section">
                <div class="logs-header">
                    <h2>Total Records</h2>
                    <span class="badge" id="detection-count">0</span>
                </div>
            </section>
        </aside>

        <!-- MAIN DATABASE WINDOW -->
        <main class="db-main">
            <div class="ai-header">
                <h2>Authorities Database</h2>
                <p>Review detected infrastructure anomalies and images stored in the system</p>
            </div>

            <div class="gallery-grid" id="gallery-grid">
                <!-- Loaded via JS -->
            </div>
        </main>
        
    </div>

    <script>
        async function fetchDetections() {
            try {
                const response = await fetch('/api/detections');
                const data = await response.json();
                
                // Update Sidebar
                document.getElementById('detection-count').textContent = data.length;
                
                const galleryGrid = document.getElementById('gallery-grid');

                if (data.length === 0) {
                     galleryGrid.innerHTML = `
                        <div class="empty-state-db">
                            <i class="fa-solid fa-folder-open"></i>
                            <h3>No Records Found</h3>
                            <p>Waiting for new detections to be logged into the database...</p>
                        </div>
                     `;
                } else {
                    galleryGrid.innerHTML = '';
                    data.forEach(det => {
                        const imageSrc = det.image_path ? `/static/saved_images/${det.image_path}` : 'https://via.placeholder.com/300x200?text=No+Image';
                        galleryGrid.innerHTML += `
                            <div class="record-card">
                                <img src="${imageSrc}" alt="Pothole #${det.id}" class="record-image" onerror="this.src='https://via.placeholder.com/300x200?text=Image+Not+Found'">
                                <div class="record-info">
                                    <div class="record-id">
                                        <span>Incident #${det.id}</span>
                                    </div>
                                    <div class="record-detail">
                                        <i class="fa-solid fa-clock"></i> ${det.time}
                                    </div>
                                    <div class="record-detail">
                                        <i class="fa-solid fa-location-dot"></i> ${det.lat.toFixed(5)}, ${det.lon.toFixed(5)}
                                    </div>
                                    <div class="record-detail" style="margin-top: 12px;">
                                        <a href="${imageSrc}" target="_blank" style="color: var(--accent); text-decoration: none; font-size: 0.9rem; font-weight: 500;">
                                            <i class="fa-solid fa-up-right-from-square"></i> View Full Image
                                        </a>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }

            } catch (error) { console.error(error); }
        }
        
        // Fetch initially, then poll every 5 seconds
        fetchDetections();
        setInterval(fetchDetections, 5000);
    </script>
</body>
</html>
